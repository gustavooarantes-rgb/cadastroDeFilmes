<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Filmes 🎥</title>
    <link rel="stylesheet" href="style.css"> <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <h2>Cadastro de Filmes: 🎥</h2>
        <input type="text" id="Titulo" placeholder="Digite um Titulo">
        <input type="number" id="ano" placeholder="Digite o ano">
        <input type="text" id="Classificacao" placeholder="Classificação">
        <button id="btnCadastrar">Cadastrar 🎥</button>

        <hr>

        <h3>Filtrar por Classificação 🎥</h3>
        <input type="text" id="FiltroClassificacao" placeholder="Classificação">
        <button id="btnFiltrarClassificacao">Filtrar 🎥</button>

        <h3>Filtrar por Ano: 🎥</h3>
        <input type="number" id="filtroAno" placeholder="Digite o Ano">
        <button id="btnFiltrarAno">Filtrar 🎥</button>

        <h3>Lista de Filmes</h3>
        <p id="listarFilmes"></p>
    </div>
</body>
</html>
